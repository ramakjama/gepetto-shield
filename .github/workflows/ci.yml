name: CI — Gepetto Shield

on:
  push:
    branches: [main, develop]
    paths:
      - 'EPSILON/gepetto-shield/**'
  pull_request:
    branches: [main]
    paths:
      - 'EPSILON/gepetto-shield/**'

defaults:
  run:
    working-directory: EPSILON/gepetto-shield

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gepetto_shield_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: EPSILON/gepetto-shield/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm -r run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/gepetto_shield_test

      - run: pnpm -r run test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/gepetto_shield_test
          REDIS_URL: redis://localhost:6380
